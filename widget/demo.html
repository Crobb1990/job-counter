<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Counter — demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        padding: 3rem 1.5rem;
        background: #f1f5f9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #0f172a;
      }
      h1 { margin: 0; font-size: 1.1rem; font-weight: 600; color: #475569; }
      .grid {
        display: grid;
        gap: 1.5rem;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        max-width: 960px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Job counter widget — local preview</h1>
    <div class="grid">
      <div data-job-counter="whs"></div>
    </div>
    <script src="./counter.js" defer></script>
  </body>
</html>
